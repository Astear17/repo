name: Auto Commit Changes

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Generate Packages
        run: |
          dpkg-scanpackages ./debs > Packages

      - name: Compress Packages
        run: |
          bzip2 -f Packages

      - name: Stage compressed file only
        run: |
          git add Packages.bz2

      - name: Commit changes
        run: |
          git commit -m "Update Packages.bz2" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
